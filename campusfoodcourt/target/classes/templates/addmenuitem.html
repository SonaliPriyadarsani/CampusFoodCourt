<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Menu Item | Campus Food Court</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            padding: 5px 0;
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #38bdf8 !important;
        }

        .nav-link {
            color: #e2e8f0 !important;
            margin-left: 15px;
            transition: 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #38bdf8 !important;
        }

        .nav-link.active {
            color: #38bdf8 !important;
        }

        .logout-btn {
            color: #ff6b6b !important;
            font-weight: 600;
        }

        /* Page Heading */
        .page-header {
            text-align: center;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .page-header p {
            color: #cbd5e1;
            margin-top: 10px;
        }

        /* Form Card */
        .form-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: 0.4s ease;
        }

        .form-card:hover {
            transform: translateY(-5px);
        }

        /* Labels */
        .form-label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #f8fafc;
        }

        /* Input Fields */
        .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            border-radius: 10px;
            padding: 5px 10px;
            transition: 0.3s ease;
        }

        .form-control::placeholder {
            color: #cbd5e1;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-color: #38bdf8;
            box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.25);
        }

        textarea.form-control {
            resize: none;
        }

        /* Buttons */
        .btn-add {
            background: linear-gradient(45deg, #2563eb, #3b82f6);
            border: none;
            border-radius: 10px;
            padding: 5px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-add:hover {
            transform: translateY(-3px);
            color: white;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 5px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* Responsive */
        @media(max-width:768px) {

            .page-header h1 {
                font-size: 2.2rem;
            }

            .form-card {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="#">
                <i class="bi bi-shop"></i> Campus Food Court
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end"
                id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link"
                            href="/admin/menu">

                            <i class="bi bi-grid"></i> Dashboard

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active"
                            href="/admin/addmenuitem">

                            <i class="bi bi-plus-circle"></i> Add Menu

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link logout-btn"
                            th:href="@{/logout}">

                            <i class="bi bi-box-arrow-right"></i> Logout

                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->
    <div class="container py-5">

        <!-- Heading -->
        <div class="page-header">

            <h1>🍽️ Add New Menu Item</h1>

            <p>
                Add delicious food items to your campus food court menu
            </p>

        </div>

        <!-- Form -->
        <div class="row justify-content-center">

            <div class="col-lg-7 col-md-9">

                <div class="form-card">

                    <form th:action="@{/admin/addmenuitem}"
                        th:object="${menuItem}"
                        method="post">

                        <!-- Food Name -->
                        <div class="mb-4">

                            <label for="name"
                                class="form-label">

                                <i class="bi bi-basket2-fill"></i>
                                Food Name

                            </label>

                            <input type="text"
                                th:field="*{name}"
                                class="form-control"
                                id="name"
                                placeholder="Enter food item name"
                                required>

                        </div>

                        <!-- Description -->
                        <div class="mb-4">

                            <label for="description"
                                class="form-label">

                                <i class="bi bi-card-text"></i>
                                Description

                            </label>

                            <textarea th:field="*{description}"
                                class="form-control"
                                id="description"
                                rows="2"
                                placeholder="Enter food description..."
                                required></textarea>

                        </div>

                        <!-- Price -->
                        <div class="mb-4">

                            <label for="price"
                                class="form-label">

                                <i class="bi bi-cash-coin"></i>
                                Price (₹)

                            </label>

                            <input type="number"
                                th:field="*{price}"
                                class="form-control"
                                id="price"
                                step="0.01"
                                placeholder="Enter item price"
                                required>

                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-3 mt-4">

                            <button type="submit"
                                class="btn btn-add">

                                <i class="bi bi-plus-circle-fill"></i>
                                Add Menu Item

                            </button>

                            <a href="/admin/menulist"
                                class="btn btn-back">

                                <i class="bi bi-arrow-left-circle-fill"></i>
                                Back to Menu List

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
