<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Manage Menu | Campus Food Court</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: white;
    }

    /* Navbar */
    .navbar {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      padding: 5px 0;
    }

    .navbar-brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: #38bdf8 !important;
    }

    .nav-link {
      color: #e2e8f0 !important;
      margin-left: 15px;
      transition: 0.3s ease;
      font-weight: 500;
    }

    .nav-link:hover {
      color: #38bdf8 !important;
    }

    .logout-btn {
      color: #ff6b6b !important;
      font-weight: 600;
    }

    /* Page Title */
    .page-title {
      text-align: center;
    }

    .page-title h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
    }

    .page-title p {
      color: #cbd5e1;
      margin-top: 10px;
      font-size: 1.05rem;
    }

    /* Add Button */
    .add-btn {
      background: linear-gradient(45deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 5px 20px;
      font-weight: 600;
      transition: 0.3s ease;
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
    }

    .add-btn:hover {
      transform: translateY(-3px) scale(1.03);
      color: white;
    }

    /* Table Card */
    .table-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .table {
      color: white;
      margin-bottom: 0;
    }

    .table thead th {
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px;
      font-size: 1rem;
      font-weight: 600;
      color: #38bdf8;
      background: transparent;
    }

    .table tbody td {
      padding: 8px;
      vertical-align: middle;
      border-color: rgba(255, 255, 255, 0.08);
      color: #38bdf8;
    }

    .table tbody tr {
      transition: 0.3s ease;
    }

    .table tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: scale(1.01);
    }

    /* Price Badge */
    .price-badge {
      background: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      padding: 4px 10px;
      border-radius: 10px;
      font-weight: 600;
      display: inline-block;
    }

    /* Delete Button */
    .delete-btn {
      background: linear-gradient(45deg, #ef4444, #dc2626);
      border: none;
      border-radius: 15px;
      padding: 5px 10px;
      color: white;
      font-weight: 500;
      transition: 0.3s ease;
    }

    .delete-btn:hover {
      transform: scale(1.05);
      color: white;
    }

    /* Success Alert */
    .custom-alert {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 14px;
      padding: 14px;
      margin-top: 25px;
      text-align: center;
      font-weight: 500;
    }

    /* Responsive */
    @media(max-width:768px) {

      .page-title h1 {
        font-size: 2.2rem;
      }

      .table-card {
        padding: 10px;
      }

      .add-btn {
        width: 100%;
      }

      .table thead {
        display: none;
      }

      .table,
      .table tbody,
      .table tr,
      .table td {
        display: block;
        width: 100%;
      }

      .table tr {
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 5px;
      }

      .table td {
        text-align: right;
        padding-left: 50%;
        position: relative;
      }

      .table td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        width: 50%;
        text-align: left;
        font-weight: 600;
        color: #38bdf8;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

      <a class="navbar-brand" href="#">
        <i class="bi bi-shop"></i> Campus Food Court
      </a>

      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end"
        id="navbarNav">

        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link active" href="/admin/menu">
              <i class="bi bi-grid"></i> Dashboard
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/admin/addmenuitem">
              <i class="bi bi-plus-circle"></i> Add Menu
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link logout-btn"
              th:href="@{/logout}">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>

        </ul>

      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container py-5">

    <!-- Title -->
    <div class="page-title">
      <h1>🍴 Manage Menu Items</h1>
      <p>Manage, update and remove food items easily</p>
    </div>

    <!-- Add Button -->
    <div class="d-flex justify-content-end mb-4">
      <a href="/admin/addmenuitem"
        class="btn add-btn">
        <i class="bi bi-plus-circle-fill"></i> Add New Item
      </a>
    </div>

    <!-- Table -->
    <div class="table-card">

      <div class="table-responsive">

        <table class="table align-middle">

          <thead>
            <tr>
              <th>Food Item</th>
              <th>Description</th>
              <th>Price</th>
              <th class="text-center">Action</th>
            </tr>
          </thead>

          <tbody>

            <tr th:each="item : ${menuItems}">

              <td data-label="Food Item"
                th:text="${item.name}">
                Burger
              </td>

              <td data-label="Description"
                th:text="${item.description}">
                Delicious Cheese Burger
              </td>

              <td data-label="Price">
                <span class="price-badge">
                  ₹ <span th:text="${item.price}">150</span>
                </span>
              </td>

              <td data-label="Action"
                class="text-center">

                <form th:action="@{'/admin/delete/' + ${item.id}}"
                  method="post"
                  onsubmit="return confirm('Are you sure you want to delete this item?');">

                  <button type="submit"
                    class="btn delete-btn">

                    <i class="bi bi-trash-fill"></i> Delete

                  </button>

                </form>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

    <!-- Success Alert -->
    <div th:if="${param.deleted}"
      class="custom-alert">

      ✅ Menu item deleted successfully!

    </div>

  </div>

  

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
